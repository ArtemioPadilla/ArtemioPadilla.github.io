name: Validate CV Data

on:
  push:
    paths:
      - 'src/content/cv/cv-data.json'
      - 'src/content/cv/cv-schema.json'
      - 'scripts/validate-cv.ts'
      - '.github/workflows/cv-data.yml'
  pull_request:
    paths:
      - 'src/content/cv/cv-data.json'
      - 'src/content/cv/cv-schema.json'
      - 'scripts/validate-cv.ts'
      - '.github/workflows/cv-data.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:cv
      - run: echo "CV data validated successfully."
