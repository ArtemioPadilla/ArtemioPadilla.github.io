name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      description: Which page is affected?
      placeholder: e.g. /lab/neural-network
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe what went wrong
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Describe the expected behavior
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 120 on macOS
