name: Suggestion
description: Propose an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      placeholder: Describe your idea
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Related page (optional)
      placeholder: e.g. /lab, /cv, /blog
